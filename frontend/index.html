<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insurance Management System</title>
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(circle at 82% 12%, rgba(99, 102, 241, 0.16), transparent 32%),
          radial-gradient(circle at 12% 42%, rgba(14, 165, 233, 0.13), transparent 34%),
          #04080f;
      }

      .initial-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .initial-screen-card {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.045);
        padding: 32px;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.38);
      }

      .initial-screen-card h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      .initial-screen-card p {
        margin: 0;
        color: rgba(255, 255, 255, 0.58);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-screen">
        <div class="initial-screen-card">
          <h1>Insurance Management System</h1>
          <p>Loading dashboard...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
